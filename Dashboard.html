<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Student Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-body-secondary">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">
      <a class="navbar-brand fw-bold" href="Home.html">Student Portal</a>
      <a href="login.html" class="btn btn-outline-light">Logout</a>
    </div>
  </nav>

  <div class="container py-5">

    <!-- Heading -->
    <h1 class="text-center fw-bold text-primary mb-5">
      Student Dashboard
    </h1>

    <!-- Stats -->
    <div class="row g-4 mb-5">

      <div class="col-md-4">
        <div class="card bg-primary text-white border-0 shadow-lg rounded-4">
          <div class="card-body text-center py-4">
            <h5>Total Students</h5>
            <h1 class="display-4 fw-bold">12</h1>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card bg-danger text-white border-0 shadow-lg rounded-4">
          <div class="card-body text-center py-4">
            <h5>Total Absents</h5>
            <h1 class="display-4 fw-bold">2</h1>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card bg-success text-white border-0 shadow-lg rounded-4">
          <div class="card-body text-center py-4">
            <h5>Total Presents</h5>
            <h1 class="display-4 fw-bold">10</h1>
          </div>
        </div>
      </div>

    </div>

    <!-- Attendance Table -->
    <div class="card shadow-lg border-0 rounded-4">

      <div class="card-header bg-primary text-white py-3">
        <h4 class="mb-0">Student Attendance Record</h4>
      </div>

      <div class="card-body">

        <div class="table-responsive">

          <table class="table table-striped table-hover table-bordered align-middle mb-0">

            <thead class="table-primary">
              <tr>
                <th>ID</th>
                <th>Student Name</th>
                <th>Batch</th>
                <th>Present Days</th>
                <th>Absent Days</th>
              </tr>
            </thead>

            <tbody>

              <tr>
                <td>1</td>
                <td>Ali</td>
                <td>22</td>
                <td>25</td>
                <td>2</td>
              </tr>

              <tr>
                <td>2</td>
                <td>Ahmed</td>
                <td>19</td>
                <td>24</td>
                <td>3</td>
              </tr>

              <tr>
                <td>3</td>
                <td>Hamza</td>
                <td>32</td>
                <td>23</td>
                <td>4</td>
              </tr>

              <tr>
                <td>4</td>
                <td>Usman</td>
                <td>27</td>
                <td>22</td>
                <td>5</td>
              </tr>

              <tr>
                <td>5</td>
                <td>Ahsan</td>
                <td>25</td>
                <td>20</td>
                <td>7</td>
              </tr>

            </tbody>

          </table>

        </div>

      </div>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
